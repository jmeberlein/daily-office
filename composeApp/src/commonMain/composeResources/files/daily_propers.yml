  - Col. 1:21-2:7
  - John 8:12-19

"0110":
  morning:
    psalter: 138,139:1-17(18-23)
  evening:
    psalter: "147"
  year_1_readings:
  - Isa. 65:1-9
  - Rev. 3:1-6
  - John 6:1-14
  year_2_readings:
