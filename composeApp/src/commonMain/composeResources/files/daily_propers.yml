  - Eph. 6:10-20
  - John 11:17-27,38-44

"0106":
  name: Epiphany
  rank: PRINCIPAL
  collect: |
    O God, by the leading of a star you manifested your
    only Son to the peoples of the earth: Lead us, who know
    you now by faith, to your presence, where we may see
    your glory face to face; through Jesus Christ our Lord,
    who lives and reigns with you and the Holy Spirit, one
    God, now and for ever. Amen.
  morning:
    psalter: 46,97
  evening:
    psalter: 96,100
  year_1_readings:
  - Isa. 52:7-10
  - Rev. 21:22-27
  - Matt. 12:14-21
  year_2_readings:
  - Isa. 49:1-7
  - Rev. 21:22-27
  - Matt. 12:14-21

"0107":
  morning:
    psalter: "103"
  evening:
    psalter: 114,115
  year_1_readings:
  - Isa. 52:3-6
  - Rev. 2:1-7
  - John 2:1-11
  year_2_readings:
  - Deut. 8:1-3
  - Col. 1:1-14
  - John 6:30-33,48-51

"0108":
  morning:
    psalter: 117,118
  evening:
    psalter: 112,113
  year_1_readings:
  - Isa. 59:15-21
  - Rev. 2:8-17
  - John 4:46-54
  year_2_readings:
  - Exod. 17:1-7
  - Col. 1:15-23
  - John 7:37-52

"0109":
