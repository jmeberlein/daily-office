- number: 0
  default: &week_0_defaults
    season: CHRISTMAS
    collect: Almighty God, you have given your only-begotten Son to take our nature upon him, and to be born of a pure virgin: Grant that we, who have been born again and made your children by adoption and grace, may daily be renewed by your Holy Spirit; through our Lord Jesus Christ, to whom with you and the same Spirit be honor and glory, now and for ever. Amen.
    name: The {{day_of_week}} after Christmas
  SUNDAY: { <<: *week_0_defaults, morning: { psalter: "", readings: [ "", "" ] }, evening: { psalter: "", readings: [ "", "" ] } }
