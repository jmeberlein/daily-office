- number: 1
  default: &week_1_defaults
    season: CHRISTMAS
    collect: Almighty God, you have poured upon us the new light of your incarnate Word: Grant that this light, enkindled in our hearts, may shine forth in our lives; through Jesus Christ our Lord, who lives and reigns with you, in the unity of the Holy Spirit, one God, now and for ever. Amen.
    name: The {{day_of_week}} after the First Sunday after Christmas
  SUNDAY:
    <<: *week_1_defaults
    year_1_readings: [ "Isa. 62:6-7, 10-12", "Heb. 2:10-18", "Matt. 1:18-25" ]
    year_2_readings: [ "1 Samuel 1:1-2, 7b-28", "Col. 1:9-20", "Luke 2:22-40" ]
    morning: { psalter: "93, 96" }
    evening: { psalter: "34" }
  MONDAY: { <<: *week_1_defaults, morning: { psalter: "", readings: [ "", "" ] }, evening: { psalter: "", readings: [ "", "" ] } }
