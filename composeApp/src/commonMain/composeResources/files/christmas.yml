- number: 2
  default: &week_2_defaults
    season: CHRISTMAS
    collect: O God, who wonderfully created, and yet more wonderfully restored, the dignity of human nature: Grant that we may share the divine life of him who humbled himself to share our humanity, your Son Jesus Christ; who lives and reigns with you, in the unity of the Holy Spirit, one God, for ever and ever. Amen.
    name: The {{day_of_week}} after the Second Sunday after Christmas
  SUNDAY:
    <<: *week_2_defaults
    year_1_readings: [ "Ecclus. 3:3-9, 14-17", "1 John 2:12-17", "John 6:41-47" ]
    year_2_readings: [ "Wisdom 7:3-14", "Col. 3:12-17", "John 6:41-47" ]
    morning: { psalter: "66, 67" }
    evening: { psalter: "145" }
  MONDAY: { <<: *week_2_defaults, morning: { psalter: "", readings: [ "", "" ] }, evening: { psalter: "", readings: [ "", "" ] } }
